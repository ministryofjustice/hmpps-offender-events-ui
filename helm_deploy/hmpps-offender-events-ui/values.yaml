# Values here are the same across all environments
generic-service:
  nameOverride: hmpps-offender-events-ui
  productId: DPS091

  serviceAccountName: offender-events-ui

  image:
    repository: ghcr.io/ministryofjustice/hmpps-offender-events-ui
    tag: app_version # override at deployment time
    port: 8080

  ingress:
    enabled: true
    tlsSecretName: offender-events-ui-cert
    modsecurity_enabled: true
    modsecurity_snippet: |
      SecRuleEngine On
      # team here grants access to the OpenSearch logs to delve into the cause of the blockage
      SecDefaultAction "phase:2,pass,log,tag:github_team=syscon-devs,tag:namespace={{ .Release.Namespace }}"
      # Default is only GET HEAD POST OPTIONS so need to include PUT etc.
      SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE,setvar:tx.paranoia_level=3"
      # Block Detectify scanner with 418
      SecRule REQUEST_HEADERS:User-Agent "@pm detectify Detectify DETECTIFY" "id:800003,phase:1,deny,status:418,log,tag:github_team=syscon-devs,tag:namespace={{ .Release.Namespace }}"
      # Change default denial to be a 406 so that we can tell easily that it is modsecurity doing the blocking
      SecRuleUpdateActionById 949110 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
      SecRuleUpdateActionById 959100 "t:none,deny,status:406,logdata:%{SERVER_NAME}"

  poddisruptionbudget:
    enabled: true
    minAvailable: 0

  env:
    JAVA_OPTS: "-Xmx512m"
    SERVER_PORT: "8080"
    SPRING_PROFILES_ACTIVE: "logstash"
    SPRING_DATA_REDIS_SSL_ENABLED: "true"

  namespace_secrets:
    hmpps-offender-events-ui-application-insights:
      APPLICATIONINSIGHTS_CONNECTION_STRING: "APPLICATIONINSIGHTS_CONNECTION_STRING"
    oeu-sqs-instance-output:
      HMPPS_SQS_QUEUES_EVENT_QUEUE_NAME: "sqs_ptpu_name"
    oeu-sqs-dl-instance-output:
      HMPPS_SQS_QUEUES_EVENT_DLQ_NAME: "sqs_ptpu_name"
    offender-events-ui-elasticache-redis:
      SPRING_DATA_REDIS_HOST: "primary_endpoint_address"
      SPRING_DATA_REDIS_PASSWORD: "auth_token"

  allowlist:
    unilink-aovpn1: 194.75.210.216/29
    unilink-aovpn3: 78.33.10.50/31
    unilink-aovpn4: 78.33.10.52/30
    unilink-aovpn5: 78.33.10.56/30
    unilink-aovpn6: 78.33.10.60/32
    unilink-aovpn7: 78.33.32.99/32
    unilink-aovpn8: 78.33.32.100/30
    unilink-aovpn9: 78.33.32.104/30
    unilink-aovpn10: 78.33.32.108/32
    groups:
      - internal
      - unilink_staff

generic-prometheus-alerts:
  targetApplication: hmpps-offender-events-ui
  sqsAlertsTotalMessagesThreshold: 20
